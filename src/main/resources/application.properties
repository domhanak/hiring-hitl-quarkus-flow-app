# HTTP Client Tuning
quarkus.flow.http.client.connect-timeout=5000
quarkus.flow.http.client.read-timeout=60000

# Enable RESTEasy Reactive wire logging
quarkus.flow.http.client.logging.scope=request-response
quarkus.flow.http.client.logging.body-limit=2048
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

# LC4j config
quarkus.langchain4j.timeout=60000
quarkus.langchain4j.ollama.chat-model.timeout=60000

# Enable Hibernate and auto-create the schema for testing
quarkus.hibernate-orm.database.generation=update
quarkus.datasource.db-kind=postgresql

# --- CLOUD EVENTS SETTINGS ---
# Quarkus Flow relies on CloudEvents metadata to route signals to the correct instance
quarkus.flow.messaging.enabled=true
quarkus.flow.messaging.defaults-enabled=true

# Allows the engine to see the 'ce_' headers sent from the Console
mp.messaging.incoming.flow-in.cloud-events=true

# --- DEFAULT CONFIGURATION FOR QFLOW MESSAGING ---
# Flow Engine Inbound CloudEvents (structured JSON)
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=flow-in
mp.messaging.incoming.flow-in.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.incoming.flow-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Flow Engine Outbound CloudEvents (structured JSON)
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=flow-out
mp.messaging.outgoing.flow-out.value.serializer=org.apache.kafka.common.serialization.ByteArraySerializer
mp.messaging.outgoing.flow-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- 3. CONSOLE INBOUND ---
# The console needs to listen to the topic where the workflow is now correctly sending data
mp.messaging.incoming.reviews-ready-in.connector=smallrye-kafka
mp.messaging.incoming.reviews-ready-in.topic=flow-out
mp.messaging.incoming.reviews-ready-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.reviews-ready-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- 4. CONSOLE OUTBOUND (Signals back to flow-in) ---
mp.messaging.outgoing.hiring-reviews-out.connector=smallrye-kafka
mp.messaging.outgoing.hiring-reviews-out.topic=flow-in
mp.messaging.outgoing.hiring-reviews-out.cloud-events=false
mp.messaging.outgoing.hiring-reviews-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.hiring-reviews-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer